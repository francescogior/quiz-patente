<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#082f2e" />
    <title>Quiz Patente AB</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="data/questions.js"></script>
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p><span></span>Simulazione ministeriale</p>
          <h1>Quiz Patente AB</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-button" id="installButton" type="button" hidden>Installa</button>
          <button class="primary-button" id="newExamButton" type="button">Nuova scheda</button>
        </div>
      </header>

      <main>
        <section class="exam-status" aria-label="Stato della scheda">
          <div class="status-row">
            <div class="status-card status-current">
              <span class="status-label">Domanda</span>
              <strong id="questionCounter">1/30</strong>
            </div>
            <div class="status-card status-timer">
              <span class="status-label">Tempo</span>
              <strong id="timer">20:00</strong>
            </div>
            <div class="status-card">
              <span class="status-label">Risposte</span>
              <strong id="answeredCounter">0/30</strong>
            </div>
            <div class="status-card">
              <span class="status-label">Soglia</span>
              <strong id="threshold">3 errori</strong>
            </div>
            <button
              class="ghost-button drawer-toggle"
              id="questionDrawerButton"
              type="button"
              aria-controls="questionDrawer"
              aria-expanded="false"
            >
              Domande
            </button>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div id="progressBar"></div>
          </div>
        </section>

        <section class="question-panel" id="questionPanel" aria-live="polite">
          <div class="question-media" id="questionMedia" hidden>
            <img id="questionImage" alt="" />
          </div>
          <p class="topic" id="questionTopic">Quiz ministeriali</p>
          <h2 id="questionText">Caricamento domanda...</h2>

          <div class="answer-grid" aria-label="Risposte">
            <button class="answer-button answer-true" data-answer="true" type="button">
              <span class="answer-key">V</span>
              <span class="answer-copy">Vero</span>
            </button>
            <button class="answer-button answer-false" data-answer="false" type="button">
              <span class="answer-key">F</span>
              <span class="answer-copy">Falso</span>
            </button>
          </div>

          <div class="question-actions">
            <button class="ghost-button" id="prevButton" type="button">Indietro</button>
            <button class="ghost-button" id="nextButton" type="button">Avanti</button>
            <button class="danger-button" id="finishButton" type="button">Concludi</button>
          </div>
        </section>

        <nav class="question-dots desktop-dots" id="questionDots" aria-label="Domande della scheda"></nav>

        <section class="results-panel" id="resultsPanel" hidden>
          <div class="result-hero">
            <p id="resultLabel">Esito</p>
            <h2 id="resultTitle">Scheda completata</h2>
            <span id="resultScore">0 errori</span>
          </div>
          <div class="result-grid">
            <div>
              <span class="status-label">Corrette</span>
              <strong id="correctCount">0</strong>
            </div>
            <div>
              <span class="status-label">Errori</span>
              <strong id="errorCount">0</strong>
            </div>
            <div>
              <span class="status-label">Tempo usato</span>
              <strong id="usedTime">0:00</strong>
            </div>
          </div>
          <div class="review-list" id="reviewList"></div>
        </section>
      </main>

      <footer>
        <span id="sourceInfo">Fonte ministeriale</span>
        <span id="offlineStatus">PWA</span>
      </footer>
    </div>

    <div class="mobile-exam-dock" aria-label="Navigazione scheda">
      <div class="mobile-dock-summary">
        <span id="mobileQuestionCounter">1/30</span>
        <strong id="mobileTimer">20:00</strong>
        <span id="mobileAnsweredCounter">0/30</span>
      </div>
      <div class="mobile-progress-track" aria-hidden="true">
        <div id="mobileProgressBar"></div>
      </div>
      <button
        class="primary-button mobile-drawer-toggle"
        id="mobileQuestionDrawerButton"
        type="button"
        aria-controls="questionDrawer"
        aria-expanded="false"
      >
        Domande
      </button>
    </div>

    <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
    <aside
      class="question-drawer"
      id="questionDrawer"
      aria-labelledby="questionDrawerTitle"
      aria-modal="true"
      role="dialog"
      hidden
    >
      <div class="drawer-header">
        <div>
          <span class="status-label">Navigazione</span>
          <h2 id="questionDrawerTitle">Domande</h2>
        </div>
        <button class="ghost-button" id="closeDrawerButton" type="button">Chiudi</button>
      </div>
      <nav class="question-dots drawer-dots" id="drawerQuestionDots" aria-label="Domande della scheda"></nav>
    </aside>
  </body>
</html>
